# nginx configuration for self-hosting loomicompany.com
#
# Usage:
#   1. Put this file at /etc/nginx/sites-available/loomicompany.conf
#   2. Symlink: sudo ln -s /etc/nginx/sites-available/loomicompany.conf /etc/nginx/sites-enabled/
#   3. Copy the site files to /var/www/loomicompany
#   4. Issue a TLS cert (e.g. `sudo certbot --nginx -d loomicompany.com -d www.loomicompany.com`)
#   5. Reload: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name loomicompany.com www.loomicompany.com;
    return 301 https://loomicompany.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.loomicompany.com;

    # ssl_certificate /etc/letsencrypt/live/loomicompany.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/loomicompany.com/privkey.pem;

    return 301 https://loomicompany.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name loomicompany.com;

    root /var/www/loomicompany;
    index index.html;

    # ssl_certificate /etc/letsencrypt/live/loomicompany.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/loomicompany.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;
    gzip_vary on;

    # Pretty URLs — try .html fallback
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Aggressive caching for hashed static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Moderate caching for HTML
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
